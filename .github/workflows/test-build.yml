name: Test DITA-OT Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download and install DITA-OT 4.x
        run: |
          DITA_OT_VERSION=4.2.4
          curl -L "https://github.com/dita-ot/dita-ot/releases/download/${DITA_OT_VERSION}/dita-ot-${DITA_OT_VERSION}.zip" \
            -o /tmp/dita-ot.zip
          unzip -q /tmp/dita-ot.zip -d ~/
          mv ~/dita-ot-${DITA_OT_VERSION} ~/dita-ot
          echo "$HOME/dita-ot/bin" >> $GITHUB_PATH

      - name: Install mdita-yaml-keys plugin
        run: dita install "$(pwd)"

      - name: Run test build
        run: |
          dita --input=samples/garden-guide.md --format=html5 --output=out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dita-output
          path: out/
